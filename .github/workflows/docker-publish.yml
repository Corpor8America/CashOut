name: Build, Tag, and Publish Docker Image

on:
  push:
    branches:
      - master

permissions:
  contents: write   # REQUIRED for creating git tags

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED so tags are available

      - name: Read VERSION file
        id: version
        run: echo "app_version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tagcheck
        run: |
          if git rev-parse "v${{ steps.version.outputs.app_version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if version already tagged
        if: steps.tagcheck.outputs.exists == 'true'
        run: |
          echo "Version already exists. Skipping build."
          exit 0

      - name: Create and push tag if missing
        if: steps.tagcheck.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "v${{ steps.version.outputs.app_version }}"
          git push origin "v${{ steps.version.outputs.app_version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cashout
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.app_version }}
            type=raw,value=v${{ steps.version.outputs.app_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.app_version }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./CashOut/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
