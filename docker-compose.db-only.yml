version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spening
      POSTGRES_USER: spening
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U spening" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
